# Known dataset types expected in a comprehensive DOT open data portal
expected_dataset_types:
  - crash and safety statistics
  - infrastructure condition and inventory
  - traffic volumes and congestion
  - transit ridership and performance
  - freight and commodity flows
  - licensing and registration
  - inspections and compliance
  - environmental and emissions
  - project and construction data
  - geospatial / GIS layers

# Quality thresholds
stale_threshold_days: 730  # 2 years
