# Supplemental transportation data sources for gap analysis.
# Documentation: docs/reference-catalog.md
#
# registry_fetchers: fetched programmatically at runtime
# portals / api_endpoints / clearinghouses / standards_registries: static entries

registry_fetchers:
  - id: mobilitydata_gbfs
    name: MobilityData GBFS systems.csv
    url: https://raw.githubusercontent.com/MobilityData/gbfs/master/systems.csv
    bureau: MobilityData
    modal: Bicycles & Pedestrians
    format: csv
    country_filter: US
    title_field: Name
    url_field: "Auto-Discovery URL"
    id_field: "System ID"

  - id: omf_mds_providers
    name: Open Mobility Foundation MDS providers.csv
    url: https://raw.githubusercontent.com/openmobilityfoundation/mobility-data-specification/main/providers.csv
    bureau: OMF
    modal: Bicycles & Pedestrians
    format: csv
    title_field: provider_name
    url_field: mds_provider_url
    id_field: provider_id

  - id: wzdx_feed_registry
    name: WZDx Feed Registry
    url: https://data.transportation.gov/api/views/69qe-yiui/rows.csv?accessType=DOWNLOAD
    bureau: FHWA
    modal: Roadways & Bridges
    format: csv
    title_field: feedName
    url_field: url
    id_field: feedName
    notes: Individual jurisdiction work-zone feeds; metadata on DOT portal but feeds are external APIs

  - id: transitland_atlas_us
    name: Transitland Atlas (US GTFS/GBFS feeds)
    github_repo: transitland/transitland-atlas
    github_path: feeds
    exclude_patterns:
      - ".com.au."
      - ".co.uk."
      - ".ca."
      - ".de."
      - ".it."
      - ".fr."
      - ".es."
      - ".ch."
      - ".at."
      - ".be."
      - ".nl."
      - ".se."
      - ".no."
      - ".dk."
      - ".fi."
      - ".pl."
      - ".br."
      - ".mx."
      - ".nz."
      - ".jp."
      - ".kr."
      - ".in."
      - ".sg."
      - ".hk."
      - ".tw."
      - ".ph."
      - ".id."
      - ".my."
      - ".th."
      - ".vn."
      - ".ae."
      - ".il."
      - ".za."
      - ".ru."
    bureau: Transitland
    modal: Public Transit
    format: dmfr_json
    max_files: 40

socrata_discovery_queries:
  - "Department of Transportation"
  - "Federal Aviation Administration"
  - "Federal Highway Administration"
  - "Federal Railroad Administration"
  - "Federal Transit Administration"
  - "National Highway Traffic Safety Administration"
  - "Federal Motor Carrier Safety Administration"
  - "Pipeline and Hazardous Materials"
  - "Bureau of Transportation Statistics"
  - "Maritime Administration"
  - "National Transportation Atlas"
  - "grade crossing railroad"
  - "national transit database"
  - "automated traffic signal performance"
  - "probe vehicle speed"
  - "micromobility GBFS"

arcgis_hubs:
  - id: usdot_ntad
    name: USDOT Open Data (ArcGIS Hub)
    base_url: https://data-usdot.opendata.arcgis.com
    catalog_api: https://data-usdot.opendata.arcgis.com/api/v3/datasets
    bureau: BTS
    modal: Research & Statistics

  - id: bts_geodata
    name: BTS Geospatial Data Catalog
    base_url: https://geodata.bts.gov
    catalog_api: https://geodata.bts.gov/api/v3/datasets
    bureau: BTS
    modal: Research & Statistics

portals:
  - id: dot_developer
    name: DOT Developer Resources
    url: https://www.transportation.gov/developer
    bureau: OST
    modal: Cross-Modal

  - id: dot_open_gov_inventory
    name: DOT Open Government Data Inventory
    url: https://www.transportation.gov/open-government-data-inventory
    bureau: OST
    modal: Cross-Modal

  - id: ritis_npmrds
    name: RITIS / NPMRDS Analytics Platform
    url: https://npmrds.ritis.org/
    docs_url: https://ritis.org/access
    bureau: FHWA
    modal: Roadways & Bridges
    access: agreement_required
    notes: FHWA probe-speed archive; not open download on data.transportation.gov

  - id: ritis_platform
    name: Regional Integrated Transportation Information System (RITIS)
    url: https://ritis.org/
    bureau: UMD/CATT
    modal: Cross-Modal
    access: sponsorship_required
    notes: Pooled-fund clearinghouse for incidents, weather, probe data, signals

  - id: virginia_rm3p_dep
    name: Virginia RM3P Data-Exchange Platform
    url: https://rm3p.ritis.org/
    bureau: VDOT
    modal: Cross-Modal
    access: permissioned
    notes: Regional multi-agency API hub

  - id: faa_data_portal
    name: FAA Data Portal
    url: https://www.faa.gov/data
    bureau: FAA
    modal: Aviation

  - id: fra_dataportal
    name: FRA Data Portal
    url: https://dataportal.fra.dot.gov
    api_url: https://dataportal.fra.dot.gov/home/APIs
    bureau: FRA
    modal: Railroads

  - id: fra_safety_odata
    name: FRA Office of Safety OData API
    url: https://safetydata.fra.dot.gov/MasterWebService/PublicApi/Develop/QuickStartGuide
    bureau: FRA
    modal: Railroads
