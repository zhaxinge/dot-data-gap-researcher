    modal: Roadways & Bridges

  - id: fta_ntd
    name: FTA National Transit Database
    url: https://www.transit.dot.gov/ntd
    bureau: FTA
    modal: Public Transit

  - id: phmsa_data
    name: PHMSA Data and Statistics
    url: https://www.phmsa.dot.gov/data-and-statistics
    bureau: PHMSA
    modal: Pipelines & HAZMAT

  - id: marad_data
    name: MARAD Data and Reports
    url: https://www.maritime.dot.gov/data-reports
    bureau: MARAD
    modal: Maritime & Waterways

  - id: bts_ntad
    name: National Transportation Atlas Database (NTAD)
    url: https://www.bts.gov/ntad
